name: Deploy to Gandi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le site statique
        run: npm run build

      - name: Installer lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Déployer sur Gandi
        env:
          HOST: ${{ secrets.GANDI_HOST }}
          USER: ${{ secrets.GANDI_USER }}
          PASSWORD: ${{ secrets.GANDI_PASSWORD }}
        run: |
          lftp -u "$USER","$PASSWORD" sftp://$HOST <<EOF
          set sftp:auto-confirm yes
          mirror --reverse --delete out vhosts/rugban.fr/htdocs
          bye
          EOF