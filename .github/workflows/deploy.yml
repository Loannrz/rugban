name: Deploy to Gandi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Gandi
        env:
          HOST: ${{ secrets.GANDI_HOST }}
          USER: ${{ secrets.GANDI_USER }}
          PASSWORD: ${{ secrets.GANDI_PASSWORD }}
        run: |
          lftp -u "$USER","$PASSWORD" "sftp://$HOST:22" <<EOF
          set sftp:auto-confirm yes
          mirror --reverse --delete out/ vhosts/rugban.fr/htdocs/
          bye
          EOF