name: Deploy to Gandi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to Gandi
        env:
          GANDI_HOST: ${{ secrets.GANDI_HOST }}
          GANDI_USER: ${{ secrets.GANDI_USER }}
          GANDI_PASSWORD: ${{ secrets.GANDI_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 "$GANDI_HOST" >> ~/.ssh/known_hosts

          sshpass -p "$GANDI_PASSWORD" sftp \
            -o BatchMode=no \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=yes \
            -P 22 \
            "$GANDI_USER@$GANDI_HOST" <<EOF
          cd vhosts/rugban.fr/htdocs
          put -r out/*
          bye
          EOF